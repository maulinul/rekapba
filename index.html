<!DOCTYPE html>
<html lang="id" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<!-- PWA Manifest (inline via data URI) -->
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;RekapBA Pro&quot;,&quot;short_name&quot;:&quot;RekapBA&quot;,&quot;display&quot;:&quot;standalone&quot;}">
<title>RekapBA Pro</title>

<style>
/* ═══════════════════════════════════════════
   1. DESIGN TOKENS (CSS Custom Properties)
   ═══════════════════════════════════════════ */
:root {
  /* Spacing scale */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px;
  --sp-4: 16px; --sp-5: 24px; --sp-6: 32px;

  /* Colors - Light */
  --bg-primary: #f8fafc;
  --bg-card: #ffffff;
  --text-primary: #0f172a;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,.35);
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;

  /* Glassmorphism */
  --glass-bg: rgba(255,255,255,.72);
  --glass-border: rgba(255,255,255,.3);
  --glass-blur: 16px;

  /* Animation tokens */
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --ease-smooth: cubic-bezier(.4,0,.2,1);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 600ms;

  /* Layout */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --shadow-card: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.04);
  
  /* Z-Index Layers */
  --z-navbar: 100;
  --z-bottom-sheet: 200;
  --z-cmd-palette: 999;
  --z-toast: 1000;
  --z-confetti: 9999;
}

/* Dark theme override */
[data-theme="dark"] {
  --bg-primary: #0f172a;
  --bg-card: #1e293b;
  --text-primary: #f1f5f9;
  --glass-bg: rgba(30,41,59,.72);
  --glass-border: rgba(255,255,255,.08);
  --shadow-card: 0 1px 3px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.2);
}

/* ═══════════════════════════════════════════
   2. BASE / RESET
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  overflow-x: hidden;
  transition: background-color var(--duration-normal) var(--ease-smooth), color var(--duration-normal) var(--ease-smooth);
}
button { cursor: pointer; border: none; font-family: inherit; }
input, textarea { font-family: inherit; }

/* ═══════════════════════════════════════════
   3. LAYOUT - BENTO GRID
   ═══════════════════════════════════════════ */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  grid-auto-rows: min-content;
  gap: var(--sp-4);
  padding: var(--sp-4);
  max-width: 1400px;
  margin: 0 auto;
}
.bento-grid .card--grand-total {
  grid-column: 1 / -1; /* full width */
}
.bento-grid .card--input {
  grid-row: span 2;
}

@media (max-width: 768px) {
  .bento-grid .card--input {
    grid-row: span 1;
  }
}

/* ═══════════════════════════════════════════
   4. COMPONENTS
   ═══════════════════════════════════════════ */

/* 4a. Sticky Glass Navbar */
.navbar {
  position: sticky; top: 0; z-index: var(--z-navbar);
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border-bottom: 1px solid var(--glass-border);
  padding: var(--sp-3) var(--sp-5);
  display: flex; align-items: center; gap: var(--sp-4);
  justify-content: space-between;
}
.navbar__left { display: flex; align-items: center; gap: var(--sp-4); }
.navbar__right { display: flex; align-items: center; gap: var(--sp-2); }
.navbar__progress {
  position: absolute; bottom: 0; left: 0;
  height: 2px; background: var(--accent);
  transition: width 50ms linear;
  width: 0%;
}
.btn-icon {
  background: transparent;
  color: var(--text-primary);
  width: 36px; height: 36px;
  border-radius: 50%;
  display: grid; place-items: center;
  transition: background-color var(--duration-fast);
}
.btn-icon:hover { background: rgba(127,127,127,0.1); }

/* 4b. Command Palette (Ctrl+K) */
.cmd-palette {
  position: fixed; inset: 0; z-index: var(--z-cmd-palette);
  display: none; /* toggled via JS */
  place-items: start center;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.cmd-palette.active { display: grid; }
.cmd-palette__box {
  margin-top: 15vh; width: min(560px, 90vw);
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: 0 24px 80px rgba(0,0,0,.25);
  overflow: hidden;
  animation: cmdSlideIn var(--duration-normal) var(--ease-spring);
  border: 1px solid var(--glass-border);
}
@keyframes cmdSlideIn {
  from { opacity: 0; transform: translateY(-12px) scale(.97); }
}
.cmd-palette__input { 
  width: 100%; padding: var(--sp-5);
  font-size: 1.1rem; border: none; background: transparent;
  color: var(--text-primary); border-bottom: 1px solid var(--glass-border);
  outline: none;
}
.cmd-palette__results { 
  list-style: none; max-height: 50vh; overflow-y: auto; 
}
.cmd-palette__results li {
  padding: var(--sp-3) var(--sp-5);
  cursor: pointer; display: flex; justify-content: space-between;
  border-bottom: 1px solid rgba(127,127,127,0.05);
}
.cmd-palette__results li:hover, .cmd-palette__results li.selected {
  background: var(--accent-glow);
}

/* 4c. Mandor Card */
.card-mandor, .card--input, .card--grand-total {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  padding: var(--sp-4);
  border: 1px solid var(--glass-border);
}
.card-mandor {
  contain: layout style; /* perf */
  content-visibility: auto; /* skip offscreen render */
  contain-intrinsic-size: 0 280px;
  overflow: hidden;
  transition: transform var(--duration-fast) var(--ease-smooth),
              box-shadow var(--duration-fast) var(--ease-smooth);
}
.card-mandor:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,0,0,.1), 0 16px 40px rgba(0,0,0,.08);
}
.card-mandor header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: var(--sp-3);
}

/* 4d. Sparkline (pure SVG) */
.sparkline { width: 100px; height: 32px; }
.sparkline polyline {
  fill: none; stroke: var(--accent);
  stroke-width: 2; stroke-linecap: round;
  stroke-dasharray: 200; stroke-dashoffset: 200;
  animation: sparkDraw 1s var(--ease-smooth) forwards;
}
@keyframes sparkDraw { to { stroke-dashoffset: 0; } }

/* 4e. Progress Ring (SVG) */
.progress-ring { width: 80px; height: 80px; }
.progress-ring circle {
  transition: stroke-dashoffset var(--duration-slow) var(--ease-spring);
  fill: transparent; stroke-width: 8; stroke-linecap: round;
}
.progress-ring .bg { stroke: rgba(127,127,127,0.1); }
.progress-ring .fg { stroke: var(--success); stroke-dasharray: 200; stroke-dashoffset: 200; }

/* 4f. Skeleton Loading */
.skeleton {
  background: linear-gradient(90deg,
    var(--bg-card) 25%, rgba(127,127,127,.1) 50%, var(--bg-card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* 4g. Bottom Sheet (Mobile Input) */
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-bottom-sheet);
  background: var(--bg-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  transform: translateY(100%);
  transition: transform var(--duration-normal) var(--ease-spring);
  max-height: 85dvh; overflow-y: auto;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
  padding: var(--sp-4); border-top: 1px solid var(--glass-border);
}
.bottom-sheet.open { transform: translateY(0); }
.bottom-sheet__handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--text-primary); opacity: .3;
  margin: 0 auto var(--sp-4) auto;
}

/* 4h. Toast (Glassmorphism) */
.toast {
  position: fixed; bottom: var(--sp-5); right: var(--sp-5);
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: var(--sp-3) var(--sp-5);
  z-index: var(--z-toast);
  box-shadow: var(--shadow-card);
  animation: toastIn var(--duration-normal) var(--ease-spring);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(16px) scale(.95); }
}

/* ═══════════════════════════════════════════
   5. ANIMATIONS & SPECIFIC STYLES
   ═══════════════════════════════════════════ */

.card--grand-total {
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(135deg, var(--accent), #3b82f6);
  color: white;
}
.card--grand-total h2 { font-weight: 500; opacity: 0.9; margin-bottom: 4px; font-size: 0.9rem; }
.card--grand-total .odometer { font-size: 2.5rem; font-weight: 800; }

textarea {
  width: 100%; min-height: 100px;
  background: transparent; color: var(--text-primary);
  border: 1px solid rgba(127,127,127,0.2); border-radius: var(--radius-sm);
  padding: var(--sp-3); margin-bottom: var(--sp-3);
  resize: vertical;
}
textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

.btn-magnetic {
  width: 100%; padding: var(--sp-3);
  background: var(--accent); color: white;
  border-radius: var(--radius-sm); font-weight: 600;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-magnetic:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--accent-glow); }

table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
th, td { text-align: right; padding: var(--sp-2) 0; border-bottom: 1px solid rgba(127,127,127,0.1); }
th:first-child, td:first-child { text-align: left; }
th { color: rgba(127,127,127,0.8); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }

/* Staggered Entrance */
.stagger-item {
  opacity: 0; transform: translateY(20px);
  animation: staggerIn var(--duration-slow) var(--ease-spring) forwards;
}
@keyframes staggerIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Parse Scanning Highlight */
.parse-highlight {
  background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  background-size: 200% 100%;
  animation: scanHighlight .8s var(--ease-smooth);
}
@keyframes scanHighlight {
  from { background-position: -200% 0; }
  to   { background-position: 200% 0; }
}

.card-pulse-glow {
  animation: pulseGlow .8s var(--ease-smooth);
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: var(--shadow-card); }
  50% { box-shadow: 0 0 0 4px var(--accent-glow), var(--shadow-card); }
}

/* ═══════════════════════════════════════════
   6. THEMES (auto via prefers-color-scheme)
   ═══════════════════════════════════════════ */
@media (prefers-color-scheme: dark) {
  [data-theme="auto"] {
    --bg-primary: #0f172a;
    --bg-card: #1e293b;
    --text-primary: #f1f5f9;
    --glass-bg: rgba(30,41,59,.72);
    --glass-border: rgba(255,255,255,.08);
  }
}

/* ═══════════════════════════════════════════
   7. PRINT
   ═══════════════════════════════════════════ */
@media print {
  .navbar, .cmd-palette, .toast, .bottom-sheet,
  .btn, #confettiCanvas, .card--input { display: none !important; }
  .bento-grid { display: block; }
  .card-mandor {
    break-inside: avoid;
    box-shadow: none; border: 1px solid #ccc;
    margin-bottom: 12px;
  }
  body { background: #fff; color: #000; }
}

/* ═══════════════════════════════════════════
   8. REDUCED MOTION
   ═══════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .stagger-item { opacity: 1; transform: none; }
}

.d-none { display: none !important; }
</style>
</head>

<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar" id="navbar">
  <div class="navbar__left">
    <strong>📋 RekapBA Pro</strong>
  </div>
  <div class="navbar__right">
    <button id="btnCmdK" class="btn-icon" title="Cari (Ctrl+K)">🔍</button>
    <button id="btnTheme" class="btn-icon" title="Ganti Tema">🌙</button>
  </div>
  <div class="navbar__progress" id="scrollProgress"></div>
</nav>

<!-- ═══ COMMAND PALETTE ═══ -->
<div class="cmd-palette" id="cmdPalette">
  <div class="cmd-palette__box">
    <input class="cmd-palette__input" id="cmdInput" placeholder="Cari mandor, pekerjaan, aksi..." autocomplete="off" />
    <ul class="cmd-palette__results" id="cmdResults"></ul>
  </div>
</div>

<!-- ═══ MAIN BENTO GRID ═══ -->
<main class="bento-grid" id="app">

  <!-- Grand Total Card -->
  <section class="card--grand-total" id="grandTotal">
    <div>
      <h2>Grand Total Kumulatif</h2>
      <div class="odometer" id="odometerValue">Rp 0</div>
    </div>
    <svg class="progress-ring" viewBox="0 0 100 100">
      <circle class="bg" cx="50" cy="50" r="40"></circle>
      <circle class="fg" id="grandProgressRing" cx="50" cy="50" r="40" stroke-dasharray="251.2" stroke-dashoffset="251.2" transform="rotate(-90 50 50)"></circle>
    </svg>
  </section>

  <!-- Input Card / Bottom Sheet trigger -->
  <section class="card--input" id="inputCard">
    <h3 style="margin-bottom: var(--sp-3)">Input BA</h3>
    <textarea id="parseInput" placeholder="Paste baris BA di sini..."></textarea>
    <button id="btnParse" class="btn-magnetic">⚡ Parse & Simpan</button>
    <!-- Batch Preview Table -->
    <div id="batchPreview" class="d-none" style="margin-top: var(--sp-3)">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Mandor</th>
            <th>Pekerjaan</th>
            <th>%</th>
          </tr>
        </thead>
        <tbody id="batchTableBody"></tbody>
      </table>
      <button id="btnBulkSave" class="btn-magnetic" style="margin-top: var(--sp-3); background: var(--success);">✅ Simpan Terpilih</button>
    </div>
  </section>

  <!-- Mandor Cards Container -->
  <section id="mandorCards" style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--sp-4);">
    <!-- Rendered dynamically -->
  </section>

</main>

<!-- ═══ BOTTOM SHEET (Mobile) ═══ -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="bottom-sheet__handle"></div>
  <!-- Form input clone goes here if needed, or we just rely on the bento grid wrapping -->
</div>

<!-- ═══ TOAST CONTAINER ═══ -->
<div id="toastContainer"></div>

<!-- ═══ CONFETTI CANVAS ═══ -->
<canvas id="confettiCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:var(--z-confetti);"></canvas>

<template id="tplMandorCard">
  <article class="card-mandor stagger-item">
    <header>
      <div>
        <h4 class="mandor-name" style="margin-bottom: 4px;"></h4>
        <div class="mandor-divisi" style="font-size: 0.8rem; color: rgba(127,127,127,0.8);"></div>
      </div>
      <svg class="sparkline" viewBox="0 0 100 32" preserveAspectRatio="none"><polyline points="0,32 100,32"/></svg>
    </header>
    <div class="card-body">
      <table>
        <tbody class="tbl-detail"></tbody>
      </table>
    </div>
    <footer style="margin-top: var(--sp-3); display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 500;">
      <span class="termin-badge" style="color: var(--success);"></span>
      <span class="kumulatif-badge"></span>
    </footer>
  </article>
</template>

<script>
  // ==========================================
  // REKAPBA PRO - CORE LOGIC
  // ==========================================

  // 1. STATE MANAGEMENT
  let records = [];
  let settings = {
    theme: 'auto',
    customRegex: '',
    tempatKeywords: ['Dapur', 'Kitchen', 'Kamar', 'Room', 'Toilet', 'Fasad', 'Lobby', 'Koridor', 'Roof', 'Luar']
  };

  // LocalStorage Keys
  const LS_DATA = 'rekapba_data_v2';
  const LS_SETTINGS = 'rekapba_settings_v2';

  function loadData() {
    try {
      // Coba load v2 dulu
      const dataStr = localStorage.getItem(LS_DATA);
      if (dataStr) {
        records = JSON.parse(dataStr);
      } else {
        // Fallback coba migrasi dari v1
        const v1Data = localStorage.getItem('progres_mandor_data');
        if (v1Data) records = JSON.parse(v1Data);
      }
      
      const setStr = localStorage.getItem(LS_SETTINGS);
      if (setStr) settings = { ...settings, ...JSON.parse(setStr) };
      else {
        const v1Set = localStorage.getItem('progres_mandor_settings');
        if (v1Set) settings = { ...settings, ...JSON.parse(v1Set) };
      }
    } catch (e) {
      console.error('Error loading data:', e);
    }
  }

  function saveData() {
    localStorage.setItem(LS_DATA, JSON.stringify(records));
  }
  function saveSettings() {
    localStorage.setItem(LS_SETTINGS, JSON.stringify(settings));
  }

  // 2. UTILS
  const fmtMoney = (num) => new Intl.NumberFormat('id-ID').format(num || 0);
  const fmtPercent = (num) => (num || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 3 });
  const generateId = () => Math.random().toString(36).substr(2, 9);
  
  // Toast Notification
  function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = message;
    if (type === 'success') toast.style.borderLeft = '4px solid var(--success)';
    if (type === 'error') toast.style.borderLeft = '4px solid var(--danger)';
    container.appendChild(toast);
    
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(16px) scale(0.95)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // Confetti
  function triggerConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const particles = Array.from({length: 50}, () => ({
      x: window.innerWidth / 2, y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 1) * 20,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`,
      size: Math.random() * 8 + 4
    }));

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let active = false;
      particles.forEach(p => {
        p.vy += 0.5; // gravity
        p.x += p.vx; p.y += p.vy;
        if (p.y < canvas.height) active = true;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });
      if (active) requestAnimationFrame(render);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    render();
  }

  // 3. UI INTERACTIONS
  // Theme Toggle
  const btnTheme = document.getElementById('btnTheme');
  function applyTheme(theme) {
    if (theme === 'auto') {
      delete document.documentElement.dataset.theme;
      btnTheme.textContent = '🌙';
    } else {
      document.documentElement.dataset.theme = theme;
      btnTheme.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
  }
  btnTheme.addEventListener('click', () => {
    settings.theme = settings.theme === 'dark' ? 'light' : 'dark';
    saveSettings(); applyTheme(settings.theme);
  });

  // Scroll Progress
  window.addEventListener('scroll', () => {
    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById('scrollProgress').style.width = scrolled + '%';
  });

  // Command Palette
  const cmdPalette = document.getElementById('cmdPalette');
  const cmdInput = document.getElementById('cmdInput');
  
  function toggleCmd() {
    const isActive = cmdPalette.classList.contains('active');
    if (isActive) {
      cmdPalette.classList.remove('active');
      cmdInput.blur();
    } else {
      cmdPalette.classList.add('active');
      cmdInput.value = '';
      cmdInput.focus();
    }
  }
  document.getElementById('btnCmdK').addEventListener('click', toggleCmd);
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault(); toggleCmd();
    }
    if (e.key === 'Escape' && cmdPalette.classList.contains('active')) toggleCmd();
  });
  
  cmdPalette.addEventListener('click', (e) => {
    if (e.target === cmdPalette) toggleCmd();
  });

  // 4. PARSING ENGINE (from v1)
  function parseLine(line) {
    if (!line) return null;
    let fallbackPattern = /(?:(?:[^-]+-\s*)?(.*?)\s+)?(.*?)\s+(\d+(?:\.\d+)?)\s*%\s*=\s*(?:Rp\s*)?([\d.,]+)\s*(?:\/\s*(?:Rp\s*)?([\d.,]+))?/;
    let regex = settings.customRegex ? new RegExp(settings.customRegex) : fallbackPattern;
    let match = line.match(regex);
    
    if (!match) return null;

    let mandor = '', pekerjaan = '', persen = 0, kontrak = 0, kumulatif = 0;

    if (match.length >= 6) {
      mandor = (match[1] || '').trim();
      pekerjaan = (match[2] || '').trim();
      persen = parseFloat(match[3]) || 0;
      kumulatif = parseFloat((match[4] || '0').replace(/[^\d]/g, '')) || 0;
      kontrak = parseFloat((match[5] || '0').replace(/[^\d]/g, '')) || 0;
    } else {
      return { error: 'Grup tangkapan regex tidak sesuai (butuh 5 grup)' };
    }
    
    // Auto detect Divisi
    let divisi = 'Umum';
    if (pekerjaan.toLowerCase().includes('sipil') || pekerjaan.toLowerCase().includes('plafon')) divisi = 'Sipil';
    if (pekerjaan.toLowerCase().includes('listrik') || pekerjaan.toLowerCase().includes('mep')) divisi = 'MEP';
    
    return { divisi, mandor, pekerjaan, persen, kontrak, kumulatif };
  }

  document.getElementById('btnParse').addEventListener('click', () => {
    const txt = document.getElementById('parseInput').value.trim();
    if (!txt) { showToast('Textarea kosong', 'error'); return; }
    
    const lines = txt.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    let successCount = 0;
    
    lines.forEach(line => {
      const res = parseLine(line);
      if (res && !res.error) {
        // Find previous termin
        let prev = 0;
        const existings = records.filter(r => r.mandor === res.mandor && r.pekerjaan === res.pekerjaan);
        if (existings.length > 0) {
          prev = existings[existings.length - 1].kumulatif;
        }
        
        records.push({
          id: generateId(),
          tanggal: new Date().toISOString().slice(0,10),
          divisi: res.divisi,
          mandor: res.mandor,
          pekerjaan: res.pekerjaan,
          persen: res.persen,
          kontrak: res.kontrak,
          kumulatif: res.kumulatif,
          prev: prev,
          termin: res.kumulatif - prev
        });
        successCount++;
      }
    });

    if (successCount > 0) {
      saveData();
      renderApp();
      document.getElementById('parseInput').value = '';
      showToast(`Berhasil menyimpan ${successCount} BA!`, 'success');
      triggerConfetti();
    } else {
      showToast('Gagal mem-parse teks BA', 'error');
    }
  });

  // 5. RENDER ENGINE
  function renderApp() {
    renderGrandTotal();
    renderMandorCards();
  }

  function renderGrandTotal() {
    const total = records.reduce((sum, r) => sum + r.termin, 0);
    document.getElementById('odometerValue').textContent = 'Rp ' + fmtMoney(total);
    
    // Animate ring (dummy logic for visual)
    const ring = document.getElementById('grandProgressRing');
    const offset = 251.2 - (251.2 * Math.min(100, (total / 100000000) * 100) / 100);
    ring.style.strokeDashoffset = offset;
  }

  function renderMandorCards() {
    const container = document.getElementById('mandorCards');
    container.innerHTML = '';
    const tpl = document.getElementById('tplMandorCard');
    
    // Group by Mandor
    const grouped = {};
    records.forEach(r => {
      if(!grouped[r.mandor]) grouped[r.mandor] = { divisi: r.divisi, history: [] };
      grouped[r.mandor].history.push(r);
    });

    Object.keys(grouped).forEach(m => {
      const g = grouped[m];
      const clone = tpl.content.cloneNode(true);
      clone.querySelector('.mandor-name').textContent = m || 'Tanpa Nama';
      clone.querySelector('.mandor-divisi').textContent = g.divisi;
      
      const tbody = clone.querySelector('.tbl-detail');
      let totalKumulatif = 0;
      let totalTermin = 0;
      
      // Just show last 3 entries for the card
      const recent = g.history.slice(-3);
      recent.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.pekerjaan.length > 20 ? r.pekerjaan.substring(0,20)+'...' : r.pekerjaan}</td>
          <td style="color:var(--success)">+${fmtMoney(r.termin)}</td>
        `;
        tbody.appendChild(tr);
      });
      
      // Aggregate totals
      const latestJobs = {};
      g.history.forEach(r => {
        latestJobs[r.pekerjaan] = r;
      });
      Object.values(latestJobs).forEach(r => {
        totalKumulatif += r.kumulatif;
      });
      g.history.forEach(r => { totalTermin += r.termin; });
      
      clone.querySelector('.termin-badge').textContent = `Total Termin: Rp ${fmtMoney(totalTermin)}`;
      clone.querySelector('.kumulatif-badge').textContent = `Kumulatif: Rp ${fmtMoney(totalKumulatif)}`;
      
      container.appendChild(clone);
    });
  }

  // 6. INITIALIZATION
  function init() {
    loadData();
    applyTheme(settings.theme);
    renderApp();
  }
  
  init();
</script>

</body>
</html>
